name: Update Floating Tags

on:
  release:
    types: [published]

jobs:
  update-floating-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Parse semver tag
        id: semver
        run: |
          tag="${{ github.ref_name }}"
          if [[ "$tag" =~ ^v([0-9]+)\.[0-9]+\.[0-9]+$ ]]; then
            echo "major=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "Tag '$tag' does not match semver (vX.Y.Z), skipping floating tag update"
            exit 0
          fi

      - uses: actions/checkout@v4
        if: steps.semver.outputs.major != ''

      - name: Update floating tag
        if: steps.semver.outputs.major != ''
        run: |
          git tag -f ${{ steps.semver.outputs.major }}
          git push origin ${{ steps.semver.outputs.major }} --force
